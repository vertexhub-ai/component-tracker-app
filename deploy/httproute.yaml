apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: component-tracker-app
  namespace: component-tracker-app
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames: ["component-tracker-app.vertexhub.ai"]
  rules:
    - matches: [{path: {type: PathPrefix, value: /}}]
      backendRefs: [{name: component-tracker-app, port: 80}]
